<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto-Compiler Targets — Nutri-Guardian AR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
<!-- Load MindAR library for compilation -->
<script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image.prod.js"></script>

<style>
  :root {
    --teal: #0FA68E;
    --teal-dark: #0B8A76;
    --teal-light: #E6FAF5;
    --ink: #1A2E28;
    --bg: #F0FDF9;
    --card: #FFFFFF;
    --radius: 20px;
    --shadow: 0 10px 30px rgba(15, 166, 142, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, var(--bg) 0%, #E0F2FE 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: var(--ink);
  }

  .container {
    max-width: 540px;
    width: 100%;
    background: var(--card);
    padding: 40px 30px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    text-align: center;
    border: 1px solid rgba(255,255,255,0.8);
  }

  h1 {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: var(--ink);
    margin-bottom: 12px;
  }

  p {
    font-size: 14.5px;
    color: #4B5563;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .food-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
    background: #F9FAFB;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #F3F4F6;
  }

  .food-tag {
    background: white;
    border: 1px solid #E5E7EB;
    padding: 6px 12px;
    border-radius: 99px;
    font-size: 12.5px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 4px;
    color: #374151;
  }

  .food-tag.done {
    background: #DCFCE7;
    border-color: #BBF7D0;
    color: #15803D;
  }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px 24px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(15, 166, 142, 0.3);
    transition: all 0.2s ease;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(15, 166, 142, 0.4);
  }

  .btn:active {
    transform: scale(0.99);
  }

  .btn:disabled {
    background: #9CA3AF;
    box-shadow: none;
    cursor: not-allowed;
  }

  #log-box {
    margin-top: 24px;
    background: #111827;
    color: #34D399;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    text-align: left;
    padding: 16px;
    border-radius: 12px;
    height: 180px;
    overflow-y: auto;
    border: 1px solid #374151;
  }

  .log-line {
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .progress-container {
    width: 100%;
    background: #E5E7EB;
    height: 8px;
    border-radius: 99px;
    margin-top: 16px;
    overflow: hidden;
    display: none;
  }

  .progress-bar {
    width: 0%;
    height: 100%;
    background: var(--teal);
    transition: width 0.1s ease;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Auto-Compiler Targets 🛠️</h1>
  <p>Alat ini otomatis memuat ke-7 gambar QR makanan sesuai urutan ID yang benar (0-6) dan mengkompilasinya menjadi file pelacak AR.</p>
  
  <div class="food-list" id="food-list">
    <span class="food-tag" id="tag-0">🍗 Ayam</span>
    <span class="food-tag" id="tag-1">🍚 Nasi</span>
    <span class="food-tag" id="tag-2">🐟 Ikan</span>
    <span class="food-tag" id="tag-3">🥦 Sayur</span>
    <span class="food-tag" id="tag-4">🍎 Buah</span>
    <span class="food-tag" id="tag-5">💧 Air</span>
  </div>

  <button class="btn" id="start-btn">Mulai Kompilasi targets.mind</button>

  <div class="progress-container" id="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div id="log-box">
    <div class="log-line">Siap untuk kompilasi. Klik tombol di atas...</div>
  </div>
</div>

<script>
  const startBtn = document.getElementById('start-btn');
  const logBox = document.getElementById('log-box');
  const progressBar = document.getElementById('progress-bar');
  const progressContainer = document.getElementById('progress-container');

  const FOOD_IMAGES = [
    { id: 0, path: 'assets/qr/0-ayam.png', name: 'Ayam' },
    { id: 1, path: 'assets/qr/1-nasi.png', name: 'Nasi' },
    { id: 2, path: 'assets/qr/2-ikan.png', name: 'Ikan' },
    { id: 3, path: 'assets/qr/4-sayur.png', name: 'Sayur' },
    { id: 4, path: 'assets/qr/5-buah.png', name: 'Buah' },
    { id: 5, path: 'assets/qr/6-air.png', name: 'Air Putih' }
  ];

  function addLog(msg, color = '#34D399') {
    const line = document.createElement('div');
    line.className = 'log-line';
    line.style.color = color;
    line.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logBox.appendChild(line);
    logBox.scrollTop = logBox.scrollHeight;
  }

  function loadImage(item) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        document.getElementById(`tag-${item.id}`).classList.add('done');
        resolve(img);
      };
      img.onerror = () => {
        reject(new Error(`Gagal memuat gambar ${item.name} (${item.path})`));
      };
      img.src = item.path;
    });
  }

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    logBox.innerHTML = '';
    progressContainer.style.display = 'block';
    progressBar.style.width = '0%';
    
    // Reset tags
    FOOD_IMAGES.forEach(item => {
      document.getElementById(`tag-${item.id}`).classList.remove('done');
    });

    addLog('🚀 Memulai proses kompilasi otomatis...');

    try {
      const images = [];
      for (const item of FOOD_IMAGES) {
        addLog(`Memuat gambar #${item.id}: ${item.name}...`);
        const img = await loadImage(item);
        images.push(img);
      }
      addLog('✅ Semua gambar berhasil dimuat ke dalam memori.', '#10B981');

      addLog('⚙️ Menyiapkan MindAR Compiler (WebGL)...');
      // Inisialisasi MindAR Image Compiler
      const compiler = new window.MINDAR.IMAGE.Compiler();

      addLog('🔄 Memulai kompilasi gambar target. Proses ini membutuhkan akselerasi GPU Anda...');
      
      const buffer = await compiler.compileImageTargets(images, (progress) => {
        progressBar.style.width = `${progress}%`;
        // Batasi log progres agar tidak terlalu banyak baris
        if (Math.round(progress) % 10 === 0) {
          addLog(`Kompilasi: ${progress.toFixed(1)}%`);
        }
      });

      addLog('💾 Mengemas hasil kompilasi ke biner...');
      const exportedData = await compiler.exportData();

      addLog('📥 Mengunduh file targets.mind...');
      const blob = new Blob([exportedData], {type: 'application/octet-stream'});
      const downloadUrl = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = downloadUrl;
      a.download = 'targets.mind';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(downloadUrl);

      addLog('🎉 Sukses! File "targets.mind" telah terunduh.', '#10B981');
      addLog('👉 Langkah selanjutnya: pindahkan file "targets.mind" yang baru terunduh tersebut ke folder "project/targets/" Anda (timpa file lama).');
      addLog('Setelah itu, silakan muat ulang halaman AR Anda di HP dan uji coba kembali!', '#60A5FA');
    } catch (error) {
      addLog(`❌ GAGAL: ${error.message}`, '#EF4444');
      console.error(error);
    } finally {
      startBtn.disabled = false;
    }
  });
</script>
</body>
</html>
